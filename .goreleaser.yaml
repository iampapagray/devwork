version: 2

project_name: devwork

before:
  hooks:
    - go mod tidy
    - mkdir -p completions
    # Generate shell completions to bundle in the archives. These are wrapped in
    # `sh -c` because GoReleaser runs hooks without a shell, so the `>`
    # redirection would otherwise be passed as a literal argument.
    - sh -c "go run ./cmd/devwork completion bash > completions/devwork.bash"
    - sh -c "go run ./cmd/devwork completion zsh > completions/devwork.zsh"
    - sh -c "go run ./cmd/devwork completion fish > completions/devwork.fish"

builds:
  - id: devwork
    main: ./cmd/devwork
    binary: devwork
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - completions/*
      - presets/*

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew support moved from formulae (`brews`) to casks in GoReleaser v2.
homebrew_casks:
  - name: devwork
    repository:
      owner: iampapagray
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/iampapagray/devwork"
    description: "Create a git branch from a tracker issue (Jira, GitHub, GitLab)"
    directory: Casks
    binaries:
      - devwork
    completions:
      bash: completions/devwork.bash
      zsh: completions/devwork.zsh
      fish: completions/devwork.fish
    hooks:
      post:
        # Symlink the `devw` shorthand next to the installed binary, and clear
        # the quarantine flag so the unsigned binary runs on macOS.
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/devwork"]
          end
          system_command "/bin/ln", args: ["-sf", "#{HOMEBREW_PREFIX}/bin/devwork", "#{HOMEBREW_PREFIX}/bin/devw"]
    caveats: "A 'devw' shorthand is symlinked to devwork."

release:
  github:
    owner: iampapagray
    name: devwork
  draft: false
